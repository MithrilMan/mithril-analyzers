name: Release Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, Pack, and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to main
        shell: bash
        run: |
          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [ "$tag" = "$version" ]; then
            echo "Release tags must start with 'v'." >&2
            exit 1
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' is not a supported SemVer release tag." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure project version matches tag
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'src/Mithril.Analyzers/Mithril.Analyzers.csproj'
          $versionNode = $project.SelectSingleNode('//Project/PropertyGroup/Version')

          if ($null -eq $versionNode -or [string]::IsNullOrWhiteSpace($versionNode.InnerText)) {
            throw "Unable to find <Version> in src/Mithril.Analyzers/Mithril.Analyzers.csproj."
          }

          $projectVersion = $versionNode.InnerText.Trim()
          $tagVersion = '${{ steps.version.outputs.version }}'

          if ($projectVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match project version '$projectVersion'."
          }

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Mithril.Analyzers.sln --nologo

      - name: Build
        run: dotnet build Mithril.Analyzers.sln --configuration Release --no-restore -p:GeneratePackageOnBuild=false --nologo

      - name: Test
        run: dotnet test Mithril.Analyzers.sln --configuration Release --no-build --nologo

      - name: Pack
        run: dotnet pack src/Mithril.Analyzers/Mithril.Analyzers.csproj --configuration Release --no-build --output artifacts/packages -p:ContinuousIntegrationBuild=true --nologo

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "GitHub secret NUGET_API_KEY is required to publish to NuGet.org." >&2
            exit 1
          fi

          shopt -s nullglob
          packages=(artifacts/packages/*.nupkg)

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No .nupkg package was produced." >&2
            exit 1
          fi

          dotnet nuget push "${packages[@]}" \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate \
            --nologo

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          packages=(artifacts/packages/*.nupkg)

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No .nupkg package was produced." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${packages[@]}" --clobber
            exit 0
          fi

          release_args=(
            "$TAG"
            "${packages[@]}"
            --title "Mithril.Analyzers $VERSION"
            --verify-tag
            --generate-notes
          )

          if [[ "$VERSION" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"
